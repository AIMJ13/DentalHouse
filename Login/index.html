<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental House - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    <main class="login-container">
        <div class="login-card">
            
            <div class="brand">
                <span class="logo-icon">🦷</span>
                <h1 class="brand-name">DentalHouse</h1>
            </div>

            <div class="login-header">
                <h2>Inicio de Sesión</h2>
                <p>Ingresa tus credenciales para acceder al sistema.</p>
            </div>
            
            <form id="form-login" class="login-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="dr.morales@dentalhouse.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    

                <div class="options-group">
                    <label class="checkbox-container">
                        <input type="checkbox" name="remember">

                        <span class="checkmark-text">Recordarme</span>
                    </label>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>
                
               <button type="submit" class="btn-primary">Iniciar sesion</button>
               
             
            </form>
            
        </div>
    </main>
   <script>
const formLogin = document.getElementById('form-login');

formLogin.addEventListener('submit', function(evento) {
    evento.preventDefault();

    // Obtener los datos ingresados
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    /* ==========================================
       CREDENCIALES ESPECIALES PARA DOCTOR
       Solo con este correo y contraseña
    ========================================== */
    if (
        email === 'doctor@dentalhouse.com' &&
        password === '123456'
    ) {
        window.location.href = '../Resumen/resumen.html';
    }

    /* ==========================================
       CUALQUIER OTRO CORREO Y CONTRASEÑA
       ENTRA COMO ADMINISTRADOR
    ========================================== */
    else {
        window.location.href = '../Dashboard/Dashboard.html';
    }
});
</script>

</body>
</html>
